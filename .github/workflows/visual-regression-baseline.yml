name: visual-regression-baseline

on:
  workflow_dispatch:
    inputs:
      project:
        description: '대상 프로젝트 (둘 다 갱신하려면 both)'
        required: true
        type: choice
        default: both
        options:
          - mui
          - radix
          - both
  # main 에 시각 영향 PR 이 머지되면 자동으로 baseline 갱신 PR 발급.
  # 사용자가 PR 단계에서 인라인 이미지 코멘트로 시각 검수했다는 가정.
  # baseline PR 자체의 머지(__screenshots__ 변경) 는 commit-message [skip ci] 로
  # 무한 루프를 회피한다.
  push:
    branches: [main]
    paths:
      - 'apps/storybook-mui/**'
      - 'apps/storybook-radix/**'
      - 'packages/headless/**'
      - 'packages/styled-mui/**'
      - 'packages/styled-radix/**'
      - 'packages/tokens/**'
      - 'packages/utils/**'
      - 'packages/hooks/**'
      - 'e2e/visual/**'
      - '.github/workflows/visual-regression-baseline.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: vrt-baseline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-baseline:
    runs-on: ubuntu-latest
    # peter-evans / github-actions bot 의 PR 자동 머지로 인한 push 는 skip
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Build Storybook (mui + radix)
        run: |
          pnpm sb:build:mui
          pnpm sb:build:radix

      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Determine target project
        id: target
        run: |
          # workflow_dispatch 면 inputs.project, push 면 both 기본
          PROJECT="${{ inputs.project || 'both' }}"
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "→ target project: $PROJECT"

      - name: Generate baseline (Linux)
        run: |
          if [ "${{ steps.target.outputs.project }}" = "both" ]; then
            pnpm exec playwright test --config e2e/visual/playwright.config.ts --update-snapshots
          else
            pnpm exec playwright test --config e2e/visual/playwright.config.ts --project=${{ steps.target.outputs.project }} --update-snapshots
          fi

      - name: Create PR with new baselines
        uses: peter-evans/create-pull-request@v7
        env:
          # peter-evans 가 내부적으로 git commit 할 때 husky pre-commit/commit-msg 가
          # 도는 것을 차단. CI 환경이라 hook 의 의미가 없으며 commitlint 가 자동 메시지를
          # 거부하지 않도록 보장.
          HUSKY: '0'
        with:
          title: '[scripts] Modify: visual baseline auto-bootstrap (${{ steps.target.outputs.project }})'
          branch: vrt/baseline-${{ steps.target.outputs.project }}
          commit-message: |
            [scripts] Modify: visual baseline auto-bootstrap (${{ steps.target.outputs.project }}) [skip ci]

            Generated by visual-regression-baseline workflow run #${{ github.run_id }}
            Project: ${{ steps.target.outputs.project }}
            Trigger: ${{ github.event_name }}
          body: |
            ## Visual Regression Baseline Update — `${{ steps.target.outputs.project }}`

            이 PR 은 `visual-regression-baseline` 워크플로우 **자동 실행** 결과입니다.

            **트리거**: `${{ github.event_name }}` (commit `${{ github.sha }}`)

            **검토 항목**:
            - 추가/변경된 PNG 가 의도한 디자인과 일치하는지 시각 확인
            - 변경된 baseline 이 회귀가 아닌 의도된 변경인지 확인

            머지하면 다음 PR 부터 새 baseline 기준으로 시각 회귀가 검증됩니다.

            > 💡 main push 자동 트리거: 코드 PR 단계의 인라인 이미지 코멘트로 이미 시각
            >    검수가 끝났다는 가정. 의도하지 않은 변경이 발견되면 본 PR 머지 대신
            >    원인 코드 PR 을 revert.
          add-paths: |
            e2e/visual/__screenshots__/**
          delete-branch: true
          labels: |
            visual-regression
            baseline-update
