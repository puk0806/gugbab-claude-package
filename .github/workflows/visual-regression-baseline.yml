name: visual-regression-baseline

on:
  workflow_dispatch:
    inputs:
      project:
        description: '대상 프로젝트 (둘 다 갱신하려면 both)'
        required: true
        type: choice
        default: both
        options:
          - mui
          - radix
          - both

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Build Storybook (mui + radix)
        run: |
          pnpm sb:build:mui
          pnpm sb:build:radix

      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate baseline (Linux)
        run: |
          if [ "${{ inputs.project }}" = "both" ]; then
            pnpm exec playwright test --config e2e/visual/playwright.config.ts --update-snapshots
          else
            pnpm exec playwright test --config e2e/visual/playwright.config.ts --project=${{ inputs.project }} --update-snapshots
          fi

      - name: Create PR with new baselines
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'chore(vrt): update baseline (${{ inputs.project }})'
          branch: vrt/baseline-${{ inputs.project }}
          commit-message: |
            chore(vrt): update visual regression baseline

            Generated by visual-regression-baseline workflow run #${{ github.run_id }}
            Project: ${{ inputs.project }}
          body: |
            ## Visual Regression Baseline Update — `${{ inputs.project }}`

            이 PR은 `visual-regression-baseline` 워크플로우 자동 실행 결과입니다.

            **검토 항목:**
            - 추가/변경된 PNG가 의도한 디자인과 일치하는지 시각 확인
            - 변경된 baseline이 회귀가 아닌 의도된 변경인지 확인

            머지하면 다음 PR부터 새 baseline 기준으로 시각 회귀가 검증됩니다.
          add-paths: |
            e2e/visual/__screenshots__/**
          delete-branch: true
          labels: |
            visual-regression
            baseline-update
