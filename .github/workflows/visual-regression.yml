name: visual-regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/storybook-mui/**'
      - 'apps/storybook-radix/**'
      - 'packages/headless/**'
      - 'packages/styled-mui/**'
      - 'packages/styled-radix/**'
      - 'packages/tokens/**'
      - 'packages/utils/**'
      - 'packages/hooks/**'
      - 'e2e/visual/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/visual-regression.yml'
  push:
    branches: [main]
    paths:
      - 'apps/storybook-mui/**'
      - 'apps/storybook-radix/**'
      - 'packages/headless/**'
      - 'packages/styled-mui/**'
      - 'packages/styled-radix/**'
      - 'packages/tokens/**'
      - 'packages/utils/**'
      - 'packages/hooks/**'
      - 'e2e/visual/**'
      - 'pnpm-lock.yaml'

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: vrt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Build Storybook (mui + radix)
        run: |
          pnpm sb:build:mui
          pnpm sb:build:radix

      - name: Install Playwright (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run visual regression
        run: pnpm exec playwright test --config e2e/visual/playwright.config.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: warn

  comment-pr:
    needs: visual-regression
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Comment PR with VR result
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ## Visual Regression Result

            **Status:** `${{ needs.visual-regression.result }}`

            ${{ needs.visual-regression.result == 'failure' && '시각 회귀 발견. Actions run에서 `vrt-test-results` artifact를 다운받아 diff PNG를 확인하거나, `playwright-report`의 HTML 리포트를 보세요.' || '모든 시각 검사 통과.' }}

            [Run details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          comment-tag: vrt-comment
          mode: upsert
