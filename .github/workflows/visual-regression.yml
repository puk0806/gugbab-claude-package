name: visual-regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/storybook-mui/**'
      - 'apps/storybook-radix/**'
      - 'packages/headless/**'
      - 'packages/styled-mui/**'
      - 'packages/styled-radix/**'
      - 'packages/tokens/**'
      - 'packages/utils/**'
      - 'packages/hooks/**'
      - 'e2e/visual/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/visual-regression.yml'
  push:
    branches: [main]
    paths:
      - 'apps/storybook-mui/**'
      - 'apps/storybook-radix/**'
      - 'packages/headless/**'
      - 'packages/styled-mui/**'
      - 'packages/styled-radix/**'
      - 'packages/tokens/**'
      - 'packages/utils/**'
      - 'packages/hooks/**'
      - 'e2e/visual/**'
      - 'pnpm-lock.yaml'

permissions:
  contents: write           # PR 브랜치 baseline auto-bootstrap + vrt-snapshots/* orphan branch push
  pull-requests: write
  actions: read

concurrency:
  group: vrt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # PR 이벤트에서 head 를 정확히 체크아웃해야 push 가능 (detached HEAD 회피).
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build

      - name: Build Storybook (mui + radix)
        run: |
          pnpm sb:build:mui
          pnpm sb:build:radix

      - name: Install Playwright (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Detect baseline existence
        id: baseline
        run: |
          shopt -s nullglob globstar
          files=(e2e/visual/__screenshots__/**/*-linux.png)
          if [ ${#files[@]} -gt 0 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "→ baseline 존재: ${#files[@]} files"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "→ baseline 미존재 (auto-bootstrap 진행)"
          fi

      - name: Run visual regression (compare)
        id: vr_compare
        if: steps.baseline.outputs.exists == 'true'
        run: pnpm exec playwright test --config e2e/visual/playwright.config.ts
        continue-on-error: true

      - name: Bootstrap baseline (first PR — baseline 없을 때 자동 생성)
        if: steps.baseline.outputs.exists == 'false' && github.event_name == 'pull_request'
        run: pnpm exec playwright test --config e2e/visual/playwright.config.ts --update-snapshots

      - name: Commit baseline to PR branch
        if: steps.baseline.outputs.exists == 'false' && github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/visual/__screenshots__
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
            exit 0
          fi
          git commit -m "[scripts] Add: bootstrap visual baseline (auto by GitHub Actions)"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          echo "→ baseline PR 브랜치 commit 완료. PR Files changed 탭에서 시각 검수 가능."

      # ─────────────────────────────────────────────────────────────
      # 시각 차이 발견 시: PNG 3장(expected/actual/diff) 추출 → orphan
      # branch 에 push → PR comment 에 markdown 인라인 이미지로 임베드.
      # 사용자는 PR conversations 탭에서 스크롤만으로 모든 시각 차이 확인.
      # ─────────────────────────────────────────────────────────────

      - name: Collect failing screenshots
        id: collect
        if: |
          steps.baseline.outputs.exists == 'true' &&
          steps.vr_compare.outcome == 'failure' &&
          github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          OUTDIR=vr-snapshots
          rm -rf "$OUTDIR" && mkdir -p "$OUTDIR"

          failed=0
          if [ -d test-results ]; then
            for dir in test-results/*/; do
              [ -d "$dir" ] || continue
              name=$(basename "$dir")

              expected=$(ls "$dir"*-expected.png 2>/dev/null | head -n1 || true)
              actual=$(ls "$dir"*-actual.png 2>/dev/null | head -n1 || true)
              diff=$(ls "$dir"*-diff.png 2>/dev/null | head -n1 || true)

              # 시각 회귀 fail 만 추출 (expected + actual + diff 3장 다 있는 경우)
              if [ -n "$expected" ] && [ -n "$actual" ] && [ -n "$diff" ]; then
                mkdir -p "$OUTDIR/$name"
                cp "$expected" "$OUTDIR/$name/expected.png"
                cp "$actual"   "$OUTDIR/$name/actual.png"
                cp "$diff"     "$OUTDIR/$name/diff.png"
                failed=$((failed + 1))
              fi
            done
          fi

          echo "failed_count=$failed" >> $GITHUB_OUTPUT
          echo "→ inline preview 대상: $failed stories"

      - name: Push snapshots to vrt-snapshots branch
        if: |
          steps.baseline.outputs.exists == 'true' &&
          steps.vr_compare.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          steps.collect.outputs.failed_count != '0'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          SNAPBRANCH="vrt-snapshots/pr-${PR_NUMBER}"

          # 임시 디렉토리에 orphan branch 워크트리
          TMPDIR=$(mktemp -d)
          git worktree add --orphan -B "$SNAPBRANCH" "$TMPDIR"
          (
            cd "$TMPDIR"
            git rm -rf . 2>/dev/null || true
            cp -R "$GITHUB_WORKSPACE/vr-snapshots/." .
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            if git diff --cached --quiet; then
              echo "No snapshots to commit"
            else
              git commit -m "vrt: snapshots for PR #${PR_NUMBER} (run ${RUN_ID})"
              git push -f origin "HEAD:${SNAPBRANCH}"
              echo "→ Pushed to ${SNAPBRANCH}"
            fi
          )
          git worktree remove "$TMPDIR" --force

      - name: Build inline image comment body
        id: comment_body
        if: |
          steps.baseline.outputs.exists == 'true' &&
          steps.vr_compare.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          steps.collect.outputs.failed_count != '0'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
          FAILED_COUNT: ${{ steps.collect.outputs.failed_count }}
        run: |
          set -euo pipefail
          SNAPBRANCH="vrt-snapshots/pr-${PR_NUMBER}"
          BASE_URL="https://raw.githubusercontent.com/${REPO}/${SNAPBRANCH}"
          LIMIT=20

          # 본문 빌드
          {
            echo "## ❌ Visual Regression — ${FAILED_COUNT} stories 시각 차이 감지"
            echo ""
            echo "| Expected (baseline) | Actual (this PR) | Diff |"
            echo "|---|---|---|"
            echo "각 row 는 한 story 의 시각 비교. 의도된 변경이면 \`visual-regression-baseline\` 워크플로우 dispatch 로 baseline 갱신."
            echo ""

            shown=0
            for storydir in vr-snapshots/*/; do
              [ -d "$storydir" ] || continue
              if [ "$shown" -ge "$LIMIT" ]; then
                remain=$((FAILED_COUNT - LIMIT))
                echo ""
                echo "_… and ${remain} more. 전체는 [Run details](${SERVER}/${REPO}/actions/runs/${RUN_ID}) 의 \`playwright-report\` artifact 참고._"
                break
              fi
              story=$(basename "$storydir")
              echo ""
              echo "### \`${story}\`"
              echo ""
              echo "<table><tr>"
              echo "<td align=\"center\"><b>Expected</b><br><img src=\"${BASE_URL}/${story}/expected.png\" width=\"320\"></td>"
              echo "<td align=\"center\"><b>Actual</b><br><img src=\"${BASE_URL}/${story}/actual.png\" width=\"320\"></td>"
              echo "<td align=\"center\"><b>Diff</b><br><img src=\"${BASE_URL}/${story}/diff.png\" width=\"320\"></td>"
              echo "</tr></table>"
              shown=$((shown + 1))
            done

            echo ""
            echo "---"
            echo "[📂 Run details](${SERVER}/${REPO}/actions/runs/${RUN_ID}) · Snapshots branch: \`${SNAPBRANCH}\`"
          } > comment-body.md

          {
            echo "body<<COMMENT_EOF"
            cat comment-body.md
            echo "COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment PR with inline images (failure)
        if: |
          steps.baseline.outputs.exists == 'true' &&
          steps.vr_compare.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          steps.collect.outputs.failed_count != '0'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: ${{ steps.comment_body.outputs.body }}
          comment-tag: vrt-inline
          mode: upsert

      - name: Comment PR — passed (no diff)
        if: |
          steps.baseline.outputs.exists == 'true' &&
          steps.vr_compare.outcome == 'success' &&
          github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ## ✅ Visual Regression — 모든 시각 검사 통과

            baseline 과 시각 차이 없음.

            [Run details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          comment-tag: vrt-inline
          mode: upsert

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload diff artifacts on failure
        if: steps.vr_compare.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vrt-test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: warn

      # 마지막에 실제 fail 상태로 잡 종료 (PR check 가 ❌ 표시되도록).
      # 위 inline comment / artifact upload step 들은 모두 끝난 뒤이므로 안전.
      - name: Propagate compare failure to job status
        if: steps.vr_compare.outcome == 'failure'
        run: |
          echo "Visual regression detected — see PR comment for inline diff."
          exit 1
