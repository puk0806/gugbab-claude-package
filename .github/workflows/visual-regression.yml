name: visual-regression

on:
  # paths-filter 를 workflow 레벨에서 제거 — branch protection 의 required status check
  # 가 PR 마다 항상 visual-regression check 를 기대하도록. 시각 영향 없는 PR 은 잡 안의
  # detect step 에서 빠르게 skip 처리하지만 status check 는 success 로 끝나 머지 가능.
  pull_request:
    branches: [main]
    # labeled 이벤트는 'accept-baseline' 라벨일 때만 baseline 갱신 모드 진입.
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: vrt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    # labeled 이벤트는 'accept-baseline' 라벨일 때만 처리, 그 외 라벨 부여는 잡 자체 skip.
    if: |
      github.event_name != 'pull_request' ||
      github.event.action != 'labeled' ||
      github.event.label.name == 'accept-baseline'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # dorny/paths-filter 가 base ↔ head diff 검사 위해 fetch-depth=2 필요.
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect visual paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          # packages/** 전체를 시각 영향으로 간주하고 비-시각 패키지(설정 전용)만 제외.
          # 새 시각 영향 패키지가 추가돼도 자동 매치되어 paths 누락 위험 차단.
          # 시각 무관 패키지(예: 새 *-config 패키지) 추가 시에만 아래 ! 제외 목록에 추가.
          # 체크리스트는 CLAUDE.md 의 "새 패키지 추가 시" 섹션 참조.
          filters: |
            visual:
              - 'apps/storybook-mui/**'
              - 'apps/storybook-radix/**'
              - 'packages/**'
              - '!packages/biome-config/**'
              - '!packages/tsconfig/**'
              - '!packages/commitlint-config/**'
              - 'e2e/visual/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/visual-regression.yml'

      - name: Detect mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] \
              && [ "${{ github.event.action }}" = "labeled" ] \
              && [ "${{ github.event.label.name }}" = "accept-baseline" ]; then
            echo "mode=accept" >> $GITHUB_OUTPUT
            echo "→ accept-baseline 라벨 감지 — baseline 갱신 모드 (사람 게이트)"
          elif [ "${{ steps.changes.outputs.visual }}" != "true" ]; then
            echo "mode=skip" >> $GITHUB_OUTPUT
            echo "→ 시각 영향 paths 변경 없음 — 검증 skip (status check 는 success)"
          else
            echo "mode=compare" >> $GITHUB_OUTPUT
            echo "→ 시각 회귀 비교 모드"
          fi

      - name: Skip notice
        if: steps.mode.outputs.mode == 'skip'
        run: echo "✅ 시각 영향 없는 PR — 검증 skip. 머지 차단되지 않음."

      - uses: pnpm/action-setup@v4
        if: steps.mode.outputs.mode != 'skip'
        with:
          version: 9.9.0

      - uses: actions/setup-node@v4
        if: steps.mode.outputs.mode != 'skip'
        with:
          node-version: 22.13.1
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.mode.outputs.mode != 'skip'
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        if: steps.mode.outputs.mode != 'skip'
        run: pnpm build

      - name: Build Storybook (mui + radix)
        if: steps.mode.outputs.mode != 'skip'
        run: |
          pnpm sb:build:mui
          pnpm sb:build:radix

      - name: Install Playwright (chromium only)
        if: steps.mode.outputs.mode != 'skip'
        run: pnpm exec playwright install --with-deps chromium

      - name: Detect baseline existence
        id: baseline
        run: |
          shopt -s nullglob globstar
          files=(e2e/visual/__screenshots__/**/*-linux.png)
          if [ ${#files[@]} -gt 0 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "→ baseline 존재: ${#files[@]} files"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "→ baseline 미존재"
          fi

      # ─────────────────────────────────────────────────────────────
      # ACCEPT 모드: 'accept-baseline' 라벨 감지 시 baseline 갱신 + PR 브랜치 commit.
      # 사용자가 PR conversations 탭에서 인라인 이미지 검수 → 라벨 부여 → 자동 갱신 →
      # CI 자동 재실행(synchronize) → compare 통과 → 머지 활성.
      # 인라인 이미지 코멘트(vrt-diff-images)는 별도 태그라 라벨 부여 후에도 영구 보존.
      # ─────────────────────────────────────────────────────────────

      - name: Generate accepted baseline
        if: steps.mode.outputs.mode == 'accept'
        run: pnpm exec playwright test --config e2e/visual/playwright.config.ts --update-snapshots

      - name: Commit accepted baseline to PR branch
        if: steps.mode.outputs.mode == 'accept'
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/visual/__screenshots__
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
            exit 0
          fi
          git commit -m "[scripts] Modify: accepted baseline via accept-baseline label"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          echo "→ baseline 갱신 commit 을 PR 브랜치에 push 완료. CI 자동 재실행 후 통과 예상."

      - name: Comment PR — baseline accepted (status)
        if: steps.mode.outputs.mode == 'accept'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ## ✅ Baseline Accepted

            `accept-baseline` 라벨 감지 — baseline 을 PR 의 시각 변경으로 갱신 + PR 브랜치에 commit 했습니다.

            - CI 가 자동 재실행되어 통과 예상 (baseline = 현재 코드 캡처)
            - 머지하면 코드 + 새 baseline 이 한 번에 main 에 박제
            - 위쪽의 인라인 이미지 자료(`vrt-diff-images` 코멘트)는 영구 보존됩니다.
          comment-tag: vrt-status
          mode: upsert

      # ─────────────────────────────────────────────────────────────
      # COMPARE 모드: baseline ↔ 현재 캡처 비교.
      # 차이 발견 시 인라인 이미지 코멘트 등록(vrt-diff-images, 영구 보존).
      # 머지 차단 유지 — 사람이 라벨 부여로 명시적 동의해야 baseline 갱신.
      # ─────────────────────────────────────────────────────────────

      - name: Run visual regression (compare)
        id: vr_compare
        if: steps.mode.outputs.mode == 'compare' && steps.baseline.outputs.exists == 'true'
        run: pnpm exec playwright test --config e2e/visual/playwright.config.ts
        continue-on-error: true

      - name: Bootstrap baseline (first PR — baseline 없을 때 자동 생성)
        if: |
          steps.mode.outputs.mode == 'compare' &&
          steps.baseline.outputs.exists == 'false' &&
          github.event_name == 'pull_request'
        run: pnpm exec playwright test --config e2e/visual/playwright.config.ts --update-snapshots

      - name: Commit bootstrap baseline to PR branch
        if: |
          steps.mode.outputs.mode == 'compare' &&
          steps.baseline.outputs.exists == 'false' &&
          github.event_name == 'pull_request'
        env:
          HUSKY: '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/visual/__screenshots__
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
            exit 0
          fi
          git commit -m "[scripts] Add: bootstrap visual baseline (auto by GitHub Actions)"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          echo "→ bootstrap baseline PR 브랜치 commit 완료."

      - name: Collect failing screenshots
        id: collect
        if: |
          steps.mode.outputs.mode == 'compare' &&
          steps.baseline.outputs.exists == 'true' &&
          steps.vr_compare.outcome == 'failure' &&
          github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          OUTDIR=vr-snapshots
          rm -rf "$OUTDIR" && mkdir -p "$OUTDIR"

          failed=0
          if [ -d test-results ]; then
            for dir in test-results/*/; do
              [ -d "$dir" ] || continue
              name=$(basename "$dir")

              expected=$(ls "$dir"*-expected.png 2>/dev/null | head -n1 || true)
              actual=$(ls "$dir"*-actual.png 2>/dev/null | head -n1 || true)
              diff=$(ls "$dir"*-diff.png 2>/dev/null | head -n1 || true)

              if [ -n "$expected" ] && [ -n "$actual" ] && [ -n "$diff" ]; then
                mkdir -p "$OUTDIR/$name"
                cp "$expected" "$OUTDIR/$name/expected.png"
                cp "$actual"   "$OUTDIR/$name/actual.png"
                cp "$diff"     "$OUTDIR/$name/diff.png"
                failed=$((failed + 1))
              fi
            done
          fi

          echo "failed_count=$failed" >> $GITHUB_OUTPUT
          echo "→ inline preview 대상: $failed stories"

      - name: Push snapshots to vrt-snapshots branch
        if: |
          steps.mode.outputs.mode == 'compare' &&
          steps.baseline.outputs.exists == 'true' &&
          steps.vr_compare.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          steps.collect.outputs.failed_count != '0'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          SNAPBRANCH="vrt-snapshots/pr-${PR_NUMBER}"

          TMPDIR=$(mktemp -d)
          git worktree add --orphan -B "$SNAPBRANCH" "$TMPDIR"
          (
            cd "$TMPDIR"
            git rm -rf . 2>/dev/null || true
            cp -R "$GITHUB_WORKSPACE/vr-snapshots/." .
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            if git diff --cached --quiet; then
              echo "No snapshots to commit"
            else
              git commit -m "vrt: snapshots for PR #${PR_NUMBER} (run ${RUN_ID})"
              git push -f origin "HEAD:${SNAPBRANCH}"
              echo "→ Pushed to ${SNAPBRANCH}"
            fi
          )
          git worktree remove "$TMPDIR" --force

      - name: Build inline image comment body
        id: comment_body
        if: |
          steps.mode.outputs.mode == 'compare' &&
          steps.baseline.outputs.exists == 'true' &&
          steps.vr_compare.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          steps.collect.outputs.failed_count != '0'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
          FAILED_COUNT: ${{ steps.collect.outputs.failed_count }}
        run: |
          set -euo pipefail
          SNAPBRANCH="vrt-snapshots/pr-${PR_NUMBER}"
          BASE_URL="https://raw.githubusercontent.com/${REPO}/${SNAPBRANCH}"
          LIMIT=20

          {
            echo "## 🔍 Visual Regression — ${FAILED_COUNT} stories 시각 차이 감지"
            echo ""
            echo "**아래 이미지로 시각 변경 의도를 검수하세요.**"
            echo ""
            echo "- 의도된 변경이면 PR 에 \`accept-baseline\` 라벨 부여 → workflow 가 자동으로 baseline 갱신 + commit + CI 재실행 → 머지 활성"
            echo "- 의도하지 않은 회귀면 PR 코드 수정 또는 close"
            echo ""
            echo "이 코멘트의 인라인 이미지 자료는 baseline 갱신 후에도 그대로 보존됩니다."
            echo ""

            shown=0
            for storydir in vr-snapshots/*/; do
              [ -d "$storydir" ] || continue
              if [ "$shown" -ge "$LIMIT" ]; then
                remain=$((FAILED_COUNT - LIMIT))
                echo ""
                echo "_… and ${remain} more. 전체는 [Run details](${SERVER}/${REPO}/actions/runs/${RUN_ID}) 의 \`playwright-report\` artifact 참고._"
                break
              fi
              story=$(basename "$storydir")
              echo ""
              echo "### \`${story}\`"
              echo ""
              echo "<table><tr>"
              echo "<td align=\"center\"><b>Expected</b><br><img src=\"${BASE_URL}/${story}/expected.png\" width=\"320\"></td>"
              echo "<td align=\"center\"><b>Actual</b><br><img src=\"${BASE_URL}/${story}/actual.png\" width=\"320\"></td>"
              echo "<td align=\"center\"><b>Diff</b><br><img src=\"${BASE_URL}/${story}/diff.png\" width=\"320\"></td>"
              echo "</tr></table>"
              shown=$((shown + 1))
            done

            echo ""
            echo "---"
            echo "[📂 Run details](${SERVER}/${REPO}/actions/runs/${RUN_ID}) · Snapshots: \`${SNAPBRANCH}\`"
          } > comment-body.md

          {
            echo "body<<COMMENT_EOF"
            cat comment-body.md
            echo "COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      # 인라인 이미지 코멘트 — vrt-diff-images 태그. 한 번 등록되면 같은 PR 안에서
       # 갱신 가능하지만, baseline 갱신/통과 메시지는 별도 태그(vrt-status)라 덮어쓰지
       # 않음 → 시각 자료는 PR conversations 에 영구 보존.
      - name: Comment PR with inline images (failure)
        if: |
          steps.mode.outputs.mode == 'compare' &&
          steps.baseline.outputs.exists == 'true' &&
          steps.vr_compare.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          steps.collect.outputs.failed_count != '0'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: ${{ steps.comment_body.outputs.body }}
          comment-tag: vrt-diff-images
          mode: upsert

      - name: Comment PR — passed (no diff, status)
        if: |
          steps.mode.outputs.mode == 'compare' &&
          steps.baseline.outputs.exists == 'true' &&
          steps.vr_compare.outcome == 'success' &&
          github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ## ✅ Visual Regression — 모든 시각 검사 통과

            baseline 과 시각 차이 없음 — 머지 가능.

            [Run details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          comment-tag: vrt-status
          mode: upsert

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload diff artifacts on failure
        if: steps.vr_compare.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vrt-test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: warn

      # 시각 차이 발견 시 status check 를 fail 로 종료해 머지 차단.
      # 사용자가 인라인 이미지 검수 후 'accept-baseline' 라벨 부여하면 accept 모드 잡이
      # baseline 을 갱신해 다음 CI(synchronize)에서 통과 → 머지 활성.
      - name: Propagate compare failure to job status
        if: steps.mode.outputs.mode == 'compare' && steps.vr_compare.outcome == 'failure'
        run: |
          echo "Visual regression detected — see PR comment 'vrt-diff-images' for inline diff."
          echo "의도된 변경이면 PR 에 'accept-baseline' 라벨 부여 → baseline 자동 갱신."
          exit 1
